name: Update Stream Status

on:
  schedule:
    # GitHub cron は遅延・欠落があり得るため repository_dispatch も併用
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [refresh-status]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: vhs-city-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore channel cache
        uses: actions/cache@v4
        with:
          path: data/channel-cache.json
          key: vhs-channel-cache
          restore-keys: |
            vhs-channel-cache

      - name: Fetch YouTube status
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RSS_ENTRIES_PER_CHANNEL: '10'
        run: node scripts/fetch-youtube-status.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
