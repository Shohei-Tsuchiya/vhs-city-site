name: Update Stream Status

on:
  schedule:
    # 毎時0分付近の負荷を避け、2系統の cron で冗長化
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
    - cron: '4,34 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore channel cache
        uses: actions/cache@v4
        with:
          path: data/channel-cache.json
          key: vhs-channel-cache
          restore-keys: |
            vhs-channel-cache

      - name: Fetch YouTube status
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RSS_ENTRIES_PER_CHANNEL: '10'
        run: node scripts/fetch-youtube-status.mjs

      - name: Commit and push if streams changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/status.json data/channel-cache.json
          if git diff --staged --quiet; then
            echo "No stream changes to commit."
            exit 0
          fi
          git commit -m "chore: update stream status"
          git push
