name: Update Stream Status

on:
  repository_dispatch:
    types: [refresh-status]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: vhs-city-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      quota_skipped: ${{ steps.fetch.outputs.quota_skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch YouTube status
        id: fetch
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RSS_ENTRIES_PER_CHANNEL: '10'
        run: |
          node scripts/fetch-youtube-status.mjs
          if [ -f .quota-skipped ]; then
            echo "quota_skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "quota_skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages
        if: steps.fetch.outputs.quota_skipped != 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.fetch.outputs.quota_skipped != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update
    if: needs.update.outputs.quota_skipped != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
