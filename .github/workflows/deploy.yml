name: Deploy VHS City Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy_skipped: ${{ steps.fetch.outputs.deploy_skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check committed status
        id: status
        if: github.event_name == 'push'
        run: |
          YEAR=$(node -e "console.log(new Date(JSON.parse(require('fs').readFileSync('data/status.json','utf8')).updatedAt||0).getUTCFullYear())")
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"

      - name: Restore last good status
        if: github.event_name == 'workflow_dispatch' || steps.status.outputs.year < 2020
        uses: actions/cache/restore@v4
        with:
          path: data/status.json
          key: vhs-status-json-${{ github.run_id }}
          restore-keys: |
            vhs-status-json-

      - name: Discard stale status.json
        run: node scripts/discard-stale-status.mjs

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch YouTube status
        if: github.event_name == 'workflow_dispatch'
        id: fetch
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RSS_ENTRIES_PER_CHANNEL: '10'
        run: |
          node scripts/fetch-youtube-status.mjs
          if [ -f .deploy-skipped ]; then
            echo "deploy_skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save last good status
        if: github.event_name == 'workflow_dispatch' && steps.fetch.outputs.deploy_skipped != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/status.json
          key: vhs-status-json-${{ github.run_id }}

      - name: Setup Pages
        if: github.event_name == 'push' || steps.fetch.outputs.deploy_skipped != 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name == 'push' || steps.fetch.outputs.deploy_skipped != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    if: github.event_name == 'push' || needs.build.outputs.deploy_skipped != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
